  <rect width="1920" height="1080" fill="url(#bg)"/>
  <g opacity="0.15">
    <rect x="200" y="100" width="300" height="400" rx="5" fill="url(#gold)" transform="rotate(-15 350 300)"/>
    <rect x="1400" y="200" width="250" height="350" rx="5" fill="url(#gold)" transform="rotate(10 1525 375)"/>
    <rect x="800" y="600" width="400" height="300" rx="5" fill="url(#gold)" transform="rotate(-5 1000 750)"/>
  </g>
  <g opacity="0.08">
    <circle cx="300" cy="800" r="150" fill="url(#gold)"/>
    <circle cx="1600" cy="300" r="100" fill="url(#gold)"/>
  </g>
